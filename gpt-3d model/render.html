<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Hero Sculpture Render</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import { createSculptureScene } from './src/createSculptureScene.mjs';

      const params = new URLSearchParams(window.location.search);
      const backgroundMode = params.get('background') ?? 'transparent';
      const cream = 0xf5f1e8;

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        powerPreference: 'high-performance',
        preserveDrawingBuffer: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.04;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setClearColor(cream, backgroundMode === 'cream' ? 1 : 0);
      document.body.appendChild(renderer.domElement);

      const { scene, camera, controlsTarget } = createSculptureScene({
        includeRenderOnly: true,
        backgroundMode
      });

      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      function render() {
        const t = performance.now() / 1000;
        const cube = scene.getObjectByName('AI_Data_Glowing_Cube_Core');
        if (cube?.material) {
          cube.material.emissiveIntensity = 1.45 + Math.sin(t * 1.4) * 0.08;
        }

        const key = scene.getObjectByName('Key_Softbox_Upper_Left');
        if (key) {
          key.intensity = 4.2 + Math.sin(t * 0.35) * 0.03;
        }

        camera.lookAt(controlsTarget);
        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });

      requestAnimationFrame(() => {
        render();
        setTimeout(() => {
          window.__SCENE_READY = true;
        }, 600);
      });
    </script>
  </body>
</html>
