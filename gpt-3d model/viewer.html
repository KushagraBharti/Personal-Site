<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive Portfolio Hero Sculpture</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f5f1e8;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      canvas:active {
        cursor: grabbing;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        powerPreference: 'high-performance'
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0xf5f1e8, 1);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.02;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(6.2, 3.3, 14.2);

      const target = new THREE.Vector3(0.02, 1.72, 0.12);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.copy(target);
      controls.enablePan = false;
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.32;
      controls.minDistance = 6.4;
      controls.maxDistance = 12.5;
      controls.minPolarAngle = 48 * Math.PI / 180;
      controls.maxPolarAngle = 75 * Math.PI / 180;
      controls.minAzimuthAngle = -34 * Math.PI / 180;
      controls.maxAzimuthAngle = 34 * Math.PI / 180;

      const hemi = new THREE.HemisphereLight(0xfffbf4, 0xcfc2b4, 1.9);
      hemi.name = 'Viewer_Gentle_Ambient_Fill';
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xfff1df, 3.8);
      key.name = 'Viewer_Key_Softbox';
      key.position.set(-4.2, 6.2, 4.8);
      key.castShadow = true;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xffd8b8, 0.58);
      fill.name = 'Viewer_Warm_Fill';
      fill.position.set(4.2, 2.6, 3.2);
      scene.add(fill);

      let model;
      const loader = new GLTFLoader();
      loader.load('./exports/portfolio-hero-sculpture.glb', (gltf) => {
        model = gltf.scene;
        model.name = 'Loaded_Portfolio_Hero_Sculpture_GLB';
        scene.add(model);
        window.__VIEWER_READY = true;
      });

      function animate() {
        const t = performance.now() / 1000;
        const cube = model?.getObjectByName('AI_Data_Glowing_Cube_Core');
        if (cube?.material) {
          cube.material.emissiveIntensity = 1.45 + Math.sin(t * 1.4) * 0.08;
        }

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    </script>
  </body>
</html>
