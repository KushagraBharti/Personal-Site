<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gemini 3D Model Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f8f6f0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      canvas:active {
        cursor: grabbing;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        powerPreference: 'high-performance'
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0xf8f6f0, 1);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf8f6f0);

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 2, 8);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minPolarAngle = Math.PI / 4;
      controls.maxPolarAngle = Math.PI / 2;
      controls.minAzimuthAngle = -Math.PI / 4;
      controls.maxAzimuthAngle = Math.PI / 4;
      controls.target.set(0, 0.65, 0);

      const stoneMaterial = new THREE.MeshStandardMaterial({
        color: '#f5f2eb',
        roughness: 0.8,
        metalness: 0.1
      });

      const matteBlackMaterial = new THREE.MeshStandardMaterial({
        color: '#1a1a1a',
        roughness: 0.9,
        metalness: 0.2
      });

      const brushedMetalMaterial = new THREE.MeshStandardMaterial({
        color: '#888888',
        roughness: 0.4,
        metalness: 0.8
      });

      const orangeMaterial = new THREE.MeshStandardMaterial({
        color: '#e17055',
        roughness: 0.35,
        metalness: 0.35
      });

      const goldMaterial = new THREE.MeshStandardMaterial({
        color: '#d4af37',
        roughness: 0.28,
        metalness: 0.8
      });

      const cubeMaterial = new THREE.MeshStandardMaterial({
        color: '#ffeaa7',
        emissive: '#ffb142',
        emissiveIntensity: 1,
        toneMapped: false
      });

      const root = new THREE.Group();
      root.name = 'Gemini_SculptureScene_Recreated_For_Viewer';
      root.position.set(0, -1, 0);
      scene.add(root);

      function mesh(name, geometry, material, position = [0, 0, 0], rotation = [0, 0, 0]) {
        const object = new THREE.Mesh(geometry, material);
        object.name = name;
        object.position.set(...position);
        object.rotation.set(...rotation);
        object.castShadow = true;
        object.receiveShadow = true;
        return object;
      }

      function addPedestal() {
        root.add(mesh('Bottom_large_base', new THREE.CylinderGeometry(3, 3, 0.2, 64), stoneMaterial, [0, -1, 0]));
        root.add(mesh('Mid_tier', new THREE.CylinderGeometry(2.5, 2.5, 0.3, 64), stoneMaterial, [0, -0.7, 0]));
        root.add(mesh('Left_pillar', new THREE.CylinderGeometry(0.6, 0.6, 2, 32), stoneMaterial, [-1.2, 0.5, 0.5]));
        root.add(mesh('Right_pillar', new THREE.CylinderGeometry(0.5, 0.5, 3, 32), stoneMaterial, [1.2, 1, -0.5]));
      }

      function addArch() {
        root.add(mesh('Central_torus_arch', new THREE.TorusGeometry(1.2, 0.4, 32, 64), stoneMaterial, [0, 1.5, -0.2]));
      }

      function addGlowingCube() {
        const group = new THREE.Group();
        group.name = 'Glowing_cube_group';
        group.position.set(0, 1.5, -0.2);
        const cube = mesh('Glowing_cube', new THREE.BoxGeometry(0.5, 0.5, 0.5), cubeMaterial);
        group.add(cube);
        const light = new THREE.PointLight(0xffb142, 1.25, 2.5, 2);
        light.name = 'Glowing_cube_light';
        group.add(light);
        root.add(group);
      }

      function addOrbitRings() {
        const group = new THREE.Group();
        group.name = 'Orbit_rings';
        group.position.set(0, 1.5, -2);

        const outer = new THREE.Mesh(
          new THREE.RingGeometry(4.5, 4.52, 96),
          new THREE.MeshBasicMaterial({
            color: '#dcdde1',
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide
          })
        );
        outer.name = 'Outer_subtle_ring';
        group.add(outer);

        const inner = new THREE.Mesh(
          new THREE.RingGeometry(3.8, 3.81, 96),
          new THREE.MeshBasicMaterial({
            color: '#dcdde1',
            transparent: true,
            opacity: 0.2,
            side: THREE.DoubleSide
          })
        );
        inner.name = 'Inner_subtle_ring';
        group.add(inner);
        root.add(group);
      }

      function addLaptop() {
        const group = new THREE.Group();
        group.name = 'Laptop';
        group.position.set(-0.5, 3.5, 0);
        group.rotation.set(0.2, 0.4, -0.1);
        group.add(mesh('Laptop_base', new THREE.BoxGeometry(1.5, 0.05, 1), matteBlackMaterial));
        group.add(mesh('Laptop_screen', new THREE.BoxGeometry(1.5, 1, 0.05), matteBlackMaterial, [0, 0.5, -0.5], [1.8, 0, 0]));
        root.add(group);
      }

      function addGraduationCap() {
        const cap = mesh(
          'Graduation_cap',
          new THREE.BoxGeometry(1.2, 0.1, 1.2),
          matteBlackMaterial,
          [1.2, 2.7, -0.5],
          [0.1, -0.2, 0.1]
        );
        const tassel = mesh('Graduation_cap_tassel', new THREE.CylinderGeometry(0.02, 0.02, 0.5), orangeMaterial, [0.5, -0.2, 0]);
        cap.add(tassel);
        root.add(cap);
      }

      function addCamera() {
        const cameraBody = mesh(
          'Camera',
          new THREE.BoxGeometry(0.8, 0.6, 0.4),
          matteBlackMaterial,
          [-1.2, 1.8, 0.5],
          [0, 0.5, 0]
        );
        const lens = mesh('Camera_lens', new THREE.CylinderGeometry(0.25, 0.25, 0.4, 32), matteBlackMaterial, [0, 0, 0.3], [Math.PI / 2, 0, 0]);
        cameraBody.add(lens);
        root.add(cameraBody);
      }

      function addWrench() {
        root.add(mesh('Wrench', new THREE.BoxGeometry(0.2, 1.5, 0.05), brushedMetalMaterial, [-0.4, 1.2, 0.8], [0, 0, -0.4]));
      }

      function addPen() {
        const pen = mesh('Pen', new THREE.CylinderGeometry(0.05, 0.05, 0.8, 24), matteBlackMaterial, [-1, -0.4, 1.2], [0, 0, -0.2]);
        const tip = mesh('Pen_gold_tip', new THREE.ConeGeometry(0.05, 0.2, 24), goldMaterial, [0, -0.45, 0]);
        pen.add(tip);
        root.add(pen);
      }

      function addChefKnife() {
        const group = new THREE.Group();
        group.name = 'Chef_knife';
        group.position.set(0, -0.2, 1.5);
        group.rotation.set(0.2, 0.5, -0.5);
        group.add(mesh('Chef_knife_handle', new THREE.BoxGeometry(0.15, 0.6, 0.1), matteBlackMaterial, [0, 0.4, 0]));
        group.add(mesh('Chef_knife_blade', new THREE.BoxGeometry(0.2, 1.4, 0.02), brushedMetalMaterial, [0, -0.6, 0]));
        root.add(group);
      }

      function addBook() {
        const book = mesh('Book', new THREE.BoxGeometry(1.2, 0.3, 0.8), matteBlackMaterial, [1, -0.6, 1], [0, -0.2, 0]);
        const pages = mesh('Book_pages_edge', new THREE.BoxGeometry(1.18, 0.28, 0.78), stoneMaterial, [-0.01, 0, 0.01]);
        book.add(pages);
        root.add(book);
      }

      function addSoccerBall() {
        root.add(mesh('Soccer_ball_placeholder', new THREE.SphereGeometry(0.4, 32, 32), stoneMaterial, [1.5, 0.2, 0.5]));
      }

      function addRacingHelmet() {
        const helmet = mesh(
          'Racing_helmet',
          new THREE.SphereGeometry(0.6, 32, 32),
          matteBlackMaterial,
          [1, 0.3, 1],
          [0, -0.4, 0]
        );
        helmet.add(mesh('Racing_helmet_visor', new THREE.BoxGeometry(0.8, 0.4, 0.4), orangeMaterial, [0, 0.1, 0.4]));
        root.add(helmet);
      }

      addPedestal();
      addArch();
      addGlowingCube();
      addOrbitRings();
      addLaptop();
      addGraduationCap();
      addCamera();
      addWrench();
      addPen();
      addChefKnife();
      addBook();
      addSoccerBall();
      addRacingHelmet();

      scene.add(new THREE.AmbientLight(0xffffff, 0.4));

      const key = new THREE.DirectionalLight(0xfff6ec, 1.2);
      key.name = 'Soft_studio_light_upper_left';
      key.position.set(-5, 8, 4);
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.bias = -0.0001;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xffeaa7, 0.3);
      fill.name = 'Gentle_fill_light';
      fill.position.set(4, 2, 2);
      scene.add(fill);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.ShadowMaterial({
          color: '#8c8273',
          opacity: 0.26
        })
      );
      ground.name = 'Contact_shadow_plane';
      ground.position.set(0, -1.9, 0);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      function animate() {
        const t = performance.now() / 1000;
        const cube = scene.getObjectByName('Glowing_cube');
        const cubeGroup = scene.getObjectByName('Glowing_cube_group');
        if (cube?.material) {
          cube.material.emissiveIntensity = 1 + Math.sin(t * 2) * 0.2;
        }
        if (cubeGroup) {
          cubeGroup.position.y = 1.5 + Math.sin(t * 2) * 0.035;
          cubeGroup.rotation.y = Math.sin(t * 1.2) * 0.025;
        }

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });

      animate();
      window.__GEMINI_VIEWER_READY = true;
    </script>
  </body>
</html>
